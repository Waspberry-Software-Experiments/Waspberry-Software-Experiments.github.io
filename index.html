<!DOCTYPE html>
<html>

    <title>WBIF Viewer</title>

<body>

<canvas id="canvas" width="124" height="40"></canvas>

<script src="wbif-2.js"></script>

<script>
(async () => {

    await wbif.render("waspberry-new.wbif", canvas);

    console.log("Message:", msg);
})();
